<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <link rel="stylesheet" href="css/card.css">
</head>

<body>

    <article class="profile-card">

        <img
            src="https://placehold.co/320x200"
            alt="Placeholder profile image">

        <header>

            <h2>R V Kawin</h2>

            <p class="job-title">
                Web Developer Intern
            </p>

        </header>

        <section>

            <p class="bio">
                I am passionate about web development, currently working at TacBot Inc and enjoy creating
                responsive, user-friendly websites using HTML, CSS, JavaScript,
                and TypeScript. I continuously learn new technologies to improve
                my development skills.
            </p>

        </section>

        <footer>

            <a href="mailto:example@email.com" class="contact-btn">
                Contact
            </a>

        </footer>

    </article>

</body>

</html>
